# SkillHub Casbin model.
# Casdoor is the authentication / identity service. SkillHub embeds Casbin for resource authorization.
# Request: subject, object, action
# Example object: skill:dialogue-card, group:novel-writing-suite, proposal:*, system:*

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act, eft

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = (g(r.sub, p.sub) || r.sub == p.sub) && keyMatch2(r.obj, p.obj) && (r.act == p.act || p.act == "*" || keyMatch2(r.act, p.act))
