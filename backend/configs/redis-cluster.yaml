server:
  addr: ":8848"
  author: "admin"

database:
  provider: "postgres"
  dsn: "${AIHUB_POSTGRES_DSN}"
  autoCreate: true

migration:
  enabled: true
  dir: "./migrations"

cache:
  provider: "redis"
  redis:
    mode: "cluster"
    addrs:
      - "10.0.0.1:6379"
      - "10.0.0.2:6379"
      - "10.0.0.3:6379"
    username: ""
    password: ""
    prefix: "aihub"

objectStore:
  provider: "minio"
  s3:
    endpoint: "127.0.0.1:9000"
    region: "us-east-1"
    accessKey: "minioadmin"
    secretKey: "minioadmin"
    bucket: "aihub"
    useSSL: false
    forcePathStyle: true

runtime:
  routeCacheTTLSeconds: 300
  versionCacheTTLSeconds: 600
  groupCacheTTLSeconds: 60
